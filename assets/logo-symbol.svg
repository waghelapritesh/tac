<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#0f172a"/>

  <!-- + (Think - cross/plus = brainstorming, ideas branching) -->
  <line x1="38" y1="70" x2="38" y2="130" stroke="#3b82f6" stroke-width="10" stroke-linecap="round"/>
  <line x1="8" y1="100" x2="68" y2="100" stroke="#3b82f6" stroke-width="10" stroke-linecap="round"/>

  <!-- ^ (Architect - upward arrow = design, structure, elevation) -->
  <path d="M 80 130 L 108 60 L 136 130" fill="none" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- < (Code - angle bracket = code, execution, output) -->
  <path d="M 190 65 L 155 100 L 190 135" fill="none" stroke="#06b6d4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle connection line between the three symbols -->
  <line x1="65" y1="100" x2="82" y2="100" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="134" y1="100" x2="157" y2="100" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- TAC text small at bottom -->
  <text x="100" y="172" font-family="system-ui, sans-serif" font-weight="800" font-size="18" fill="#475569" text-anchor="middle" letter-spacing="8">TAC</text>
</svg>
