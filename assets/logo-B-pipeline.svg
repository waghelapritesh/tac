<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background rounded square -->
  <rect x="5" y="5" width="190" height="190" rx="30" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

  <!-- Three chevrons representing pipeline flow -->
  <!-- Think chevron -->
  <path d="M 40 60 L 70 100 L 40 140" fill="none" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Architect chevron -->
  <path d="M 75 60 L 105 100 L 75 140" fill="none" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Code chevron -->
  <path d="M 110 60 L 140 100 L 110 140" fill="none" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark at the end (done) -->
  <path d="M 150 95 L 160 108 L 175 82" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TAC text -->
  <text x="100" y="175" font-family="system-ui, sans-serif" font-weight="800" font-size="22" fill="white" text-anchor="middle" letter-spacing="6">TAC</text>
</svg>
