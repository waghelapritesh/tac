<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Shield shape (safety-first philosophy) -->
  <path d="M 100 10 L 185 50 L 185 130 Q 185 190 100 210 Q 15 190 15 130 L 15 50 Z"
        fill="#0f172a" stroke="#3b82f6" stroke-width="3"/>

  <!-- Inner glow -->
  <path d="M 100 25 L 172 58 L 172 128 Q 172 180 100 198 Q 28 180 28 128 L 28 58 Z"
        fill="none" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Code brackets < > -->
  <text x="100" y="95" font-family="'Courier New', monospace" font-weight="700" font-size="36" fill="#3b82f6" text-anchor="middle" opacity="0.3">&lt;  &gt;</text>

  <!-- TAC bold centered -->
  <text x="100" y="115" font-family="system-ui, sans-serif" font-weight="900" font-size="56" fill="white" text-anchor="middle">TAC</text>

  <!-- Three stage dots -->
  <circle cx="65" cy="140" r="6" fill="#3b82f6"/>
  <circle cx="100" cy="140" r="6" fill="#8b5cf6"/>
  <circle cx="135" cy="140" r="6" fill="#06b6d4"/>

  <!-- Stage labels -->
  <text x="65" y="160" font-family="system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">THINK</text>
  <text x="100" y="160" font-family="system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">ARCH</text>
  <text x="135" y="160" font-family="system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">CODE</text>

  <!-- Connection lines between dots -->
  <line x1="71" y1="140" x2="94" y2="140" stroke="#334155" stroke-width="2"/>
  <line x1="106" y1="140" x2="129" y2="140" stroke="#334155" stroke-width="2"/>
</svg>
